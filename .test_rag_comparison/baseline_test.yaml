  turns:
  - turn_id: turn1
    query: How do I install packages on a system using rpm-ostree?
    expected_response: 'To install packages on systems using rpm-ostree (RHEL Atomic
      Host, RHEL CoreOS, RHEL for Edge):


      **Command:**

      ```

      rpm-ostree install <package-name>

      ```


      **Critical requirement:** A system reboot is required after installation for
      the changes to take effect. The package is added to a new deployment/branch,
      and you must boot into it to use the installed packages.


      **Example:**

      ```

      rpm-ostree install oddjob oddjob-mkhomedir

      systemctl reboot

      ```


      **Important considerations:**


      1. **Red Hat recommendation**: Wherever possible, use containers or system containers
      to extend functionality rather than adding packages to the rpm-ostree branch
      via package layering.


      2. **Path restrictions**: rpm-ostree install will not allow packages to place
      binaries in `/opt`. Allowed paths are `/usr`, `/bin`, `/sbin`, `/lib`, and `/lib64`.
      Packages attempting to install to `/opt` will fail with "error: Unsupported
      path".


      3. **Package layering support**: This feature is fully supported and is called
      "package layering" - it adds packages on top of the base OSTree image.


      To restore default packages after override: `rpm-ostree override reset <package-name>`'
    expected_urls:
    - https://access.redhat.com/solutions/678503/index.html
    - https://access.redhat.com/articles/1789/index.html

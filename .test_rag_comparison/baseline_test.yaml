- conversation_group_id: RSPEED-1811
  turns:
  - turn_id: turn1
    query: What RHEL versions are supported by RHEL System Roles?
    expected_response: 'RHEL System Roles support varies by individual role.


      **Core roles** like network, selinux, timesync, and kdump support **RHEL 6,
      7, 8, 9, and 10**. Many security-related roles support **RHEL 7, 8, 9, and 10**
      (examples: nbde_client, nbde_server, certificate, vpn, firewall). Some newer
      roles only support **RHEL 8, 9, and 10** (crypto_policies, tlog, fapolicyd),
      while certain specialized roles require **RHEL 9.1 or later** (keylime_server).


      **Key support matrix:**

      - **network, kdump, timesync, selinux, ssh, sshd**: RHEL 6, 7, 8, 9, 10

      - **storage, nbde_client, nbde_server, certificate, vpn, firewall**: RHEL 7,
      8, 9, 10

      - **crypto_policies, tlog, fapolicyd**: RHEL 8, 9, 10

      - **keylime_server**: RHEL 9.1+


      The rhel-system-roles package was first introduced for RHEL 7 Extras in August
      2017, and became available for RHEL 9 in May 2022.


      **Control node requirements** (where Ansible runs) are typically RHEL 8, 9,
      or 10, while remote host management supports broader version ranges.'

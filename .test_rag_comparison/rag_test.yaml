- conversation_group_id: RSPEED-1930
  turns:
  - turn_id: turn1
    query: How do I install packages on a system using rpm-ostree?
    expected_response: 'On rpm-ostree-based systems (RHEL Atomic Host, RHEL for Edge),
      install packages using:


      ```

      rpm-ostree install <package_name>

      ```


      **Important considerations:**


      1. **Red Hat strongly recommends using containers or system containers** to
      extend functionality rather than adding packages to the rpm-ostree branch.


      2. **Reboot required**: After installation, restart the system to boot into
      the new branch with the installed package.


      3. **Path restrictions**: rpm-ostree will not install packages with binaries
      in `/opt`. Packages must use allowed paths: `/usr`, `/bin`, `/sbin`, `/lib`,
      and `/lib64`. Packages attempting to install to `/opt` will fail with "error:
      Unsupported path:"


      **View pending changes:**

      ```

      rpm-ostree status

      ```


      While `rpm-ostree install` is the correct method for package installation on
      ostree-managed systems, containerization is the preferred approach for extending
      Atomic Host functionality.'
